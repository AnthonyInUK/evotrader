services:
  # ── Postgres：研究/信号/策略持久化 ──────────────────────────────────────────
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-evotraders}
      POSTGRES_USER: ${POSTGRES_USER:-evotraders}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-evotraders}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # 仅内部访问，不对外暴露端口（如需本地连库可临时打开）
    expose:
      - "5432"

  # ── FastAPI REST API（研究/信号/策略接口）──────────────────────────────────
  api:
    build: .
    depends_on:
      - db
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-evotraders}:${POSTGRES_PASSWORD:-evotraders}@db:5432/${POSTGRES_DB:-evotraders}
    expose:
      - "8000"
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000

  # ── WebSocket 网关（实时模式，可选）──────────────────────────────────────────
  # 默认不启动：演示用前端内置的离线回放(真实 Q1 结果)，零成本、零 LLM 调用。
  # 网关一旦运行会用 live 数据覆盖前端状态，故仅在需要"实时跑 agent"时才起：
  #     docker compose --profile live up -d        # 启动含网关的实时模式
  # mock 模式用模拟行情、不需真实 key，但仍会调 DeepSeek 跑 agent(持续小额烧钱)。
  gateway:
    build: .
    profiles: ["live"]
    depends_on:
      - db
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-evotraders}:${POSTGRES_PASSWORD:-evotraders}@db:5432/${POSTGRES_DB:-evotraders}
    expose:
      - "8765"
    command: python -m backend.main --mode live --mock --host 0.0.0.0 --port 8765

  # ── Nginx：单一入口（静态前端 + /api 反代 + /ws 反代）───────────────────────
  frontend:
    build: ./frontend
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-80}:80"

volumes:
  postgres_data:
