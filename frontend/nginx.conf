# EvoTraders 单入口反向代理：静态前端 + REST API + WebSocket 网关。
# 所有流量从 80 端口进，按路径分发到容器内部服务（service 名即 DNS）。
#
# 用 Docker 内嵌 DNS(127.0.0.11) + 变量 proxy_pass：把上游解析推迟到请求时，
# 避免 nginx 启动时因后端容器尚未就绪而崩溃（比 upstream 块更健壮）。

server {
    listen 80;
    server_name _;

    resolver 127.0.0.11 valid=10s;

    # gzip 压缩静态资源
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1024;

    # ── 前端静态资源（SPA：找不到的路由回退到 index.html）────────────────────
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── REST API：/api/xxx → api:8000/xxx（去掉 /api 前缀）──────────────────
    location /api/ {
        set $api_upstream api:8000;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://$api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── WebSocket 网关：/ws → gateway:8765（需 Upgrade 头做协议升级）─────────
    location /ws {
        set $ws_upstream gateway:8765;
        proxy_pass http://$ws_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # WebSocket 长连接：拉长超时，避免空闲被断
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
